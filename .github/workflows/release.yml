# Publish to PyPI when a GitHub Release is published.
# Requirements:
#   - Repository secret: PYPI_API_TOKEN (PyPI → Account → API tokens → token for this project)
#   - Release tag should match `version` in pyproject.toml (e.g. tag v0.9.0 ↔ version "0.9.0")

name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,docs]"
      - name: Ruff
        run: ruff check csvdir tests && ruff format --check csvdir tests
      - name: Mypy
        run: mypy
      - name: MkDocs (strict)
        run: python -m mkdocs build --strict

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pytest
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: pytest

  publish:
    needs: [check, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify release tag matches pyproject.toml
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          TAG_VER="${TAG#v}"
          PROJ_VER=$(python - <<'PY'
          import re
          from pathlib import Path
          text = Path("pyproject.toml").read_text(encoding="utf-8")
          m = re.search(r'^version\s*=\s*"([^"]+)"', text, re.MULTILINE)
          if not m:
              raise SystemExit("Could not parse version from pyproject.toml")
          print(m.group(1))
          PY
          )
          if [ "$TAG_VER" != "$PROJ_VER" ]; then
            echo "::error::Release tag '$TAG' (version '$TAG_VER') does not match pyproject.toml version '$PROJ_VER'"
            exit 1
          fi
          echo "OK: tag version $TAG_VER matches pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build --outdir dist .

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
