# Static doc site (MkDocs). Run: python -m mkdocs build --strict
site_name: csvdir
site_description: Read every CSV in a directory with one iterator.
site_url: https://csvdir.readthedocs.io/en/latest/
repo_url: https://github.com/eddiethedean/csvdir
repo_name: eddiethedean/csvdir
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

strict: true

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/eddiethedean/csvdir
      name: csvdir on GitHub

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - tables
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span__
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true

plugins:
  - search:
      separator: '[\s\-_]+'
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            members_order: source
            separate_signature: true

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

nav:
  - Home:
      - Welcome: index.md
      - Getting started: getting-started.md
      - Changelog: CHANGELOG.md
  - Guides:
      - Overview: guides/index.md
      - Iteration: guide/iteration.md
      - Headers: guide/headers.md
      - Chunking: guide/chunking.md
      - Columns: guide/columns.md
      - Discovery: guide/discovery.md
      - Encodings: guide/encodings.md
      - Pandas: guide/pandas.md
  - Reference:
      - Configuration: reference/options.md
      - API: reference/api.md
  - Development: development.md
